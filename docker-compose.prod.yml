services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: jsm3285/prj_all:ive_backend_lc_${VERSION:-latest}
    container_name: fastapi-backend-prod
    restart: always
    ports:
      - "8001:8000"
    networks:
      - app-network
    environment:
      TZ: "Asia/Seoul"
      DATABASE_URL: "mysql+pymysql://mmdmin:Josmin13!@rds-jsm.cn88a22g2qiw.ap-northeast-2.rds.amazonaws.com:3306/my_database"
    volumes:
      - /etc/localtime:/etc/localtime:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # 빌드 시점에 AWS IP/도메인을 넘겨줄 수 있습니다.
        # 기본값으로 localhost:8001을 사용하지만 배포 시 오버라이드 가능
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8001}
    image: jsm3285/prj_all:ive_frontend_lc_${VERSION:-latest}
    container_name: react-frontend-prod
    restart: always
    ports:
      - "80:80" # Nginx는 기본 80포트를 사용
    depends_on:
      backend:
        condition: service_started
    networks:
      - app-network
    # 운영 환경에서는 Volumes로 로컬 소스 코드를 마운트하지 않습니다.

networks:
  app-network:
    driver: bridge
